<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Transcriber</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>🎙 Audio Transcriber</h1>
      <p class="subtitle">Transcrição em lote — <span id="providerBadge" class="provider-badge">...</span></p>
    </header>

    <section class="upload-zone" id="uploadZone">
      <div class="upload-inner" id="dropArea">
        <div class="upload-icon">📂</div>
        <p>Arraste arquivos aqui ou <label class="btn-link" for="fileInput">clique para selecionar</label></p>
        <p class="hint">MP3, MP4, WAV, M4A, OGG, FLAC, WEBM — até 2GB por arquivo</p>
        <input type="file" id="fileInput" multiple accept="audio/*,video/*" hidden />
        <div class="upload-controls">
          <label>Idioma:
            <select id="language">
              <option value="pt">Português</option>
              <option value="en">English</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
            </select>
          </label>
          <button id="uploadBtn" class="btn-primary" disabled>Transcrever</button>
        </div>
        <div id="selectedFiles" class="selected-files"></div>
      </div>
    </section>

    <section class="stats" id="statsBar" hidden>
      <div class="stat"><span id="statTotal">0</span><small>total</small></div>
      <div class="stat success"><span id="statDone">0</span><small>concluídos</small></div>
      <div class="stat processing"><span id="statProc">0</span><small>processando</small></div>
      <div class="stat error"><span id="statError">0</span><small>erros</small></div>
    </section>

    <section class="jobs-section">
      <div class="jobs-header">
        <h2>Fila de Transcrições</h2>
        <button id="clearDoneBtn" class="btn-ghost" hidden>Limpar concluídos</button>
      </div>
      <div id="jobsList" class="jobs-list">
        <p class="empty-state">Nenhuma transcrição ainda. Carregue arquivos acima.</p>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
